<!DOCTYPE html>
<html lang="gu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>જય ગીરનારી સેવા મંડળ</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="left-panel">

<img src="logo.png" class="logo">

<h1>જય ગીરનારી સેવા મંડળ</h1>

<p>Donor Card Generator</p>

<label>દાતાનું નામ</label>

<input
type="text"
id="name"
placeholder="દાતાનું નામ લખો">

<label>દાનની રકમ</label>

<input
type="number"
id="amount"
placeholder="જેમ કે 11000">

<label>ફોટો અપલોડ કરો</label>

<input
type="file"
id="photo"
accept="image/*">

<button id="generate">

કાર્ડ બનાવો

</button>

<button id="download">

HD Download

</button>

<button id="share">

WhatsApp Share

</button>

</div>

<div class="right-panel">

<div id="card">

<img src="background.jpeg" class="bg">

<div class="overlay"></div>

<img src="logo.png" class="card-logo">

<div class="ngo">

જય ગીરનારી સેવા મંડળ

</div>

<div class="city">

સુરત

</div>

<img id="previewPhoto">

<div class="donor-title">

દાતા શ્રી,

</div>

<div id="previewName">

દાતાનું નામ

</div>

<div id="previewAmount">

₹૦/-

</div>

<div class="thanks">

🙏 સેવા પરમો ધર્મ: આપના સહકાર બદલ આભાર. 🙏

</div>

<div class="footer">

<div>

📞 ૯૯૨૫૭૭૨૧૭૧

</div>

<div>

📞 ૭૮૭૪૧૨૧૯૦૩

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
