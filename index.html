<!DOCTYPE html>
<html lang="gu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>જય ગીરનારી સેવા મંડળ | Donor Card Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- ==========================
LEFT PANEL
=========================== -->

<div class="left-panel">

<img src="logo.png" class="logo">

<h1>જય ગીરનારી સેવા મંડળ</h1>

<p class="subtitle">
Donor Card Generator
</p>

<div class="form-group">

<label>દાતાનું નામ</label>

<input
type="text"
id="donorName"
placeholder="દાતાનું પૂરું નામ">

</div>

<div class="form-group">

<label>દાનની રકમ</label>

<input
type="number"
id="donationAmount"
placeholder="ઉદાહરણ : 11000">

</div>

<div class="form-group">

<label>દાતાનો ફોટો</label>

<div class="upload-box">

<input
type="file"
id="photoInput"
accept="image/*"
hidden>

<label
for="photoInput"
class="uploadLabel">

📷

<br><br>

ફોટો પસંદ કરો

</label>

</div>

</div>

<button id="downloadBtn">

⬇ HD Download

</button>

<button id="shareBtn">

WhatsApp Share

</button>

</div>

<!-- ==========================
RIGHT PANEL
=========================== -->

<div class="right-panel">

<div id="card">

<img
src="background.jpeg"
class="background">

<div class="overlay"></div>

<div class="gold-border"></div>

<!-- NGO LOGO -->

<div class="logo-circle">

<img
src="logo.png"
class="card-logo">

</div>

<h2 class="ngo-name">

જય ગીરનારી સેવા મંડળ

</h2>

<div class="ngo-city">

સુરત

</div>

<!-- DONOR PHOTO -->

<div class="photo-ring">

<img
id="previewPhoto"
src="default-user.png">

</div>
<!-- DONOR DETAILS -->

<div class="donor-label">
    દાતા શ્રી
</div>

<div id="previewName">
    દાતાનું નામ
</div>

<div class="amount-title">
    દાનની રકમ
</div>

<div id="previewAmount">
    ₹ ૦/-
</div>

<div id="amountWords">
    શૂન્ય રૂપિયા પૂરા
</div>

<div class="thanks">

    <strong>સેવા પરમો ધર્મ:</strong>

    <br>

    આપના સહકાર બદલ હાર્દિક આભાર.

</div>

<div id="todayDate">
    તા. --/--/----
</div>

<div class="phones">

📞 ૯૯૨૫૭૭૨૧૭૧

<br>

📞 ૭૮૭૪૧૨૧૯૦૩

</div>

</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="script.js"></script>

</body>

</html>
