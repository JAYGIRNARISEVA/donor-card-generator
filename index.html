<!DOCTYPE html>
<html lang="gu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>જય ગીરનારી સેવા મંડળ | Donor Card Generator</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Left Panel -->

    <aside class="left-panel">

        <img src="logo.png" class="logo" alt="Logo">

        <h1>જય ગીરનારી સેવા મંડળ</h1>

        <p class="subtitle">
            Donor Card Generator
        </p>

        <div class="form-group">

            <label>દાતાનું નામ</label>

            <input
            type="text"
            id="donorName"
            placeholder="દાતાનું પૂરું નામ">

        </div>

        <div class="form-group">

            <label>દાનની રકમ</label>

            <input
            type="number"
            id="donationAmount"
            placeholder="ઉદાહરણ : 11000">

        </div>

        <div class="form-group">

            <label>દાતાનો ફોટો</label>

            <label class="upload-box">

                <input
                type="file"
                id="photoInput"
                accept="image/*"
                hidden>

                <div class="upload-icon">

                    📷

                </div>

                <span>

                    ફોટો પસંદ કરો

                </span>

            </label>

        </div>

        <button id="downloadBtn">

            ⬇ HD Download

        </button>

        <button id="shareBtn">

            WhatsApp Share

        </button>

    </aside>

    <!-- Right Panel -->

    <main class="right-panel">

        <div id="card">

            <img
            src="background.jpeg"
            class="background">

            <div class="overlay"></div>

            <div class="gold-border"></div>

            <div class="logo-circle">

                <img
                src="logo.png"
                class="card-logo">

            </div>
                        <div class="ngo-name">

                જય ગીરનારી સેવા મંડળ

            </div>

            <div class="ngo-city">

                સુરત

            </div>

            <div class="photo-ring">

                <img
                id="previewPhoto"
                src="logo.png"
                alt="Donor">

            </div>

            <div class="donor-label">

                દાતા શ્રી,

            </div>

            <div
            id="previewName">

                દાતાનું નામ

            </div>

            <div
            id="previewAmount">

                ₹ ૦/-

            </div>

            <div
            id="amountWords">

                શૂન્ય રૂપિયા પૂરા

            </div>

            <div class="thanks">

                <strong>સેવા પરમો ધર્મ:</strong>

                <br>

                આપના સહકાર બદલ આભાર.

            </div>

            <div
            id="todayDate">

                તા. --/--/----

            </div>

            <div class="phones">

                📞 ૯૯૨૫૭૭૨૧૭૧

                <br>

                📞 ૭૮૭૪૧૨૧૯૦૩

            </div>

        </div>

    </main>

</div>
<!-- html2canvas Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- Main JavaScript -->
<script src="script.js"></script>

</body>
</html>
