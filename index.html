<!DOCTYPE html>
<html lang="gu">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>જય ગીરનારી સેવા મંડળ | Donor Card Generator</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <img src="logo.png" class="logo">

        <h1>જય ગીરનારી સેવા મંડળ</h1>

        <p class="subtitle">
            Donor Card Generator
        </p>

        <label>
            દાતાનું નામ
        </label>

        <input
        id="donorNameInput"
        type="text"
        placeholder="દાતાનું પૂરું નામ">

        <label>

            દાનની રકમ

        </label>

        <input
        id="amountInput"
        type="number"
        placeholder="ઉદાહરણ : 11000">

        <label>

            ફોટો અપલોડ કરો

        </label>

        <label class="upload-box">

            <input
            id="photoInput"
            type="file"
            accept="image/*"
            hidden>

            <div class="upload-icon">

                📷

            </div>

            <div>

                ફોટો પસંદ કરો

            </div>

        </label>

        <button id="generateBtn">

            ✨ સન્માન કાર્ડ બનાવો

        </button>

        <button id="downloadBtn">

            ⬇ HD Download

        </button>

        <button id="shareBtn">

            WhatsApp Share

        </button>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div id="card">

            <img src="background.jpeg" class="background">

            <div class="overlay"></div>

            <div class="gold-border"></div>

            <div class="logo-circle">

                <img
                src="logo.png"
                class="card-logo">

            </div>

            <div class="ngo-name">

                જય ગીરનારી સેવા મંડળ

            </div>

            <div class="ngo-city">

                સુરત

            </div>

            <div class="photo-ring">

                <img
                id="previewPhoto">

            </div>

            <div class="donor-label">

                દાતા શ્રી,

            </div>

            <div
            id="previewName">

                દાતાનું નામ

            </div>

            <div
            id="previewAmount">

                ₹૦/-

            </div>

            <div
            id="amountWords">

                શૂન્ય રૂપિયા પૂરા

            </div>

            <div class="thanks">

                સેવા પરમો ધર્મ:
                <br>

                આપના સહકાર બદલ આભાર.

            </div>

            <div
            id="todayDate">

                તા. --/--/----

            </div>

            <div class="phones">

                📞 ૯૯૨૫૭૭૨૧૭૧

                <br>

                📞 ૭૮૭૪૧૨૧૯૦૩

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
